name: Deploy to Supabase

# Deploys supabase/migrations (the schema) and supabase/functions (Edge
# Functions) to the connected project. Runs on GitHub's servers, pulling
# straight from the repo (no copy-paste).
# Requires two repo secrets: SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: pzulufyoqvqevjrmtmfj
      # Opt JS actions into Node 24 ahead of the June 2026 forced cutover
      # (clears the Node 20 deprecation warning).
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v5
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Check DB password secret (safe — never prints the value)
        # Temporary diagnostic for the 28P01 auth failure. Prints only the
        # password's length and character class, never the password itself.
        # Remove once the deploy is green.
        run: |
          PW="$SUPABASE_DB_PASSWORD"
          echo "length: ${#PW}"
          [ -z "$PW" ] && echo "WARNING: secret is EMPTY"
          case "$PW" in
            *[!A-Za-z0-9]*) echo "charset: contains NON-alphanumeric (special) characters" ;;
            *) echo "charset: alphanumeric only" ;;
          esac
          case "$PW" in [[:space:]]*) echo "WARNING: leading whitespace" ;; esac
          case "$PW" in *[[:space:]]) echo "WARNING: trailing whitespace" ;; esac
      - name: Link to the project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push
      - name: Deploy Edge Functions
        # Deploys all functions if any exist; a no-op before the first function
        # lands, so merging this PR won't fail. Functions read their own secrets
        # (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY) set in the Supabase dashboard.
        run: |
          if [ -d supabase/functions ] && [ -n "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy --project-ref "$PROJECT_REF"
          else
            echo "No supabase/functions present — skipping function deploy."
          fi
