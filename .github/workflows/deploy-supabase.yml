name: Deploy migrations to Supabase

# Deploys everything in supabase/migrations to the connected project.
# Runs on GitHub's servers, pulling SQL straight from the repo (no copy-paste).
# Requires two repo secrets: SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: pzulufyoqvqevjrmtmfj
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link to the project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push
