name: Deploy to Supabase

# Deploys supabase/migrations (the schema) and supabase/functions (Edge
# Functions) to the connected project. Runs on GitHub's servers, pulling
# straight from the repo (no copy-paste).
# Requires two repo secrets: SUPABASE_ACCESS_TOKEN and SUPABASE_DB_PASSWORD.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: pzulufyoqvqevjrmtmfj
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Link to the project
        run: supabase link --project-ref "$PROJECT_REF"
      - name: Push migrations
        run: supabase db push
      - name: Deploy Edge Functions
        # Deploys all functions if any exist; a no-op before the first function
        # lands, so merging this PR won't fail. Functions read their own secrets
        # (e.g. ANTHROPIC_API_KEY, OPENAI_API_KEY) set in the Supabase dashboard.
        run: |
          if [ -d supabase/functions ] && [ -n "$(ls -A supabase/functions 2>/dev/null)" ]; then
            supabase functions deploy --project-ref "$PROJECT_REF"
          else
            echo "No supabase/functions present — skipping function deploy."
          fi
